name: AI Review (pre-merge)

# 全 premed-jp リポジトリ共通の「呼び出し役」。実体は kaizen-clinic-os の
# ai-review-reusable.yml（workflow_call）。PR の open/更新ごとに Claude + Codex が
# diff をレビューし、結果を 1 つのスティッキーコメントに集約して PR に投稿する。
#
# このファイルは全 repo で同一内容。配布は scripts/ai-review/rollout-org.sh で一括する。
# 必要な repo シークレット（Free org のため org 不可・各 repo に配布）:
#   ANTHROPIC_API_KEY / PAGOS_APP_PRIVATE_KEY（pagos の set-repo-secrets.sh が配布済み・共用）
#   OPENAI_API_KEY（scripts/ai-review/set-repo-secret.sh で配布）

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  ai-review:
    # 呼び出し役ジョブ自身に PR ガードを置く（pagos.yml と同型）。
    # これが無いと、rollout が本ファイルを各 repo の main へ push したとき、PR コンテキスト
    # 無しで reusable が呼ばれ「No jobs were run（= run 失敗）」となり、購読者（org オーナー）に
    # 大量の失敗メールが飛ぶ。ジョブ自体を if で skip すれば run は中立（skipped）扱いになり
    # 失敗メールは出ない。フォーク PR（secrets が渡らずコメント不可）もここで安全に skip する。
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository
    uses: premed-jp/kaizen-clinic-os/.github/workflows/ai-review-reusable.yml@main
    permissions:
      contents: read
      pull-requests: write
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      AI_REVIEW_APP_PRIVATE_KEY: ${{ secrets.PAGOS_APP_PRIVATE_KEY }}
